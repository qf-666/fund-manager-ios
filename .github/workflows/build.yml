name: build-ios

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app for iOS Simulator
        run: |
          xcodebuild \
            -project ZhihuFunds.xcodeproj \
            -scheme ZhihuFunds \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package release artifact
        id: package
        run: |
          chmod +x scripts/package_release.sh
          scripts/package_release.sh ZhihuFunds build/DerivedData

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZhihuFunds-app-${{ github.ref_name }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ZhihuFunds-app-${{ github.ref_name }}
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZhihuFunds iOS ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
